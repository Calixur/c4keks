<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C4Keks Haushalt</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    h1 {
      color: #00ffaa;
      margin-bottom: 20px;
    }

    h2 {
      margin: 26px 0 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    input, select, button {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1b1b1b;
      color: #fff;
      font-size: 14px;
    }

    input, select {
      flex: 1;
      min-width: 180px;
    }

    button {
      background: #00aa88;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .card {
      background: #1e1e1e;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .muted {
      color: #aaa;
      font-size: 12px;
      margin-top: 4px;
    }

    .line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .status {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 10px;
    }

    .status.ok {
      background: #143326;
      color: #b8ffd5;
    }

    .status.err {
      background: #3b1717;
      color: #ffb5b5;
      white-space: pre-line;
    }

    .small-btn {
      padding: 8px 10px;
      font-size: 12px;
      background: #333;
    }

    .done {
      text-decoration: line-through;
      color: #888;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 24px 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px;
    }

    .summary-card .label {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary-card .value {
      font-size: 22px;
      font-weight: bold;
    }

    .chat-card.me {
      border-left: 4px solid #00aa88;
    }

    .chat-card.other {
      border-left: 4px solid #555;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .hidden {
      display: none !important;
    }

    .login-box {
      max-width: 460px;
      margin: 60px auto;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 20px;
    }

    .login-box h1 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    .login-box .row {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="loginView" class="login-box">
      <h1>🔐 C4Keks Login</h1>
      <div id="loginStatus"></div>

      <div class="row">
        <input id="loginEmail" type="email" placeholder="E-Mail" />
      </div>

      <div class="row">
        <input id="loginPassword" type="password" placeholder="Passwort" />
      </div>

      <div class="row">
        <button id="loginBtn">Anmelden</button>
        <button id="logoutBtnLogin" class="small-btn hidden">Logout</button>
      </div>
    </div>

    <div id="appView" class="hidden">
      <div class="topbar">
        <h1>🏠 Haushalt C&A</h1>
        <div>
          <span id="currentUserLabel" class="muted"></span>
          <button id="logoutBtn" class="small-btn">Logout</button>
        </div>
      </div>

      <div id="status"></div>

      <div class="summary">
        <div class="summary-card">
          <div class="label">Ausgaben gesamt</div>
          <div class="value" id="sumTransactions">0,00€</div>
        </div>
        <div class="summary-card">
          <div class="label">Offene Einkaufsartikel</div>
          <div class="value" id="openShopping">0</div>
        </div>
        <div class="summary-card">
          <div class="label">Letzte Chatnachricht</div>
          <div class="value" id="lastChat">–</div>
        </div>
      </div>

      <h2>💸 Ausgabe hinzufügen</h2>
      <div class="row">
        <input id="transactionTitle" placeholder="Titel, z. B. Einkauf Rewe" />
        <input id="transactionAmount" type="number" step="0.01" placeholder="Betrag" />
        <button id="addTransactionBtn">Speichern</button>
      </div>

      <h2>🛒 Einkauf hinzufügen</h2>
      <div class="row">
        <input id="shoppingTitle" placeholder="Artikel, z. B. Milch" />
        <button id="addShoppingBtn">Hinzufügen</button>
      </div>

      <h2>💬 Chat senden</h2>
      <div class="row">
        <input id="chatMessage" placeholder="Nachricht schreiben..." />
        <button id="sendChatBtn">Senden</button>
      </div>

      <hr />

      <h2>💸 Ausgaben</h2>
      <div id="transactions"></div>

      <h2>🛒 Einkauf</h2>
      <div id="shopping"></div>

      <h2>💬 Chat</h2>
      <div id="chat"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "HIER_DEINE_SUPABASE_URL";
    const SUPABASE_KEY = "HIER_DEIN_ANON_ODER_PUBLISHABLE_KEY";
    const HOUSEHOLD_ID = "67c484b6-e608-4d2c-a1cc-ee55af5340ea";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginView = document.getElementById("loginView");
    const appView = document.getElementById("appView");
    const loginStatusEl = document.getElementById("loginStatus");
    const currentUserLabelEl = document.getElementById("currentUserLabel");

    const loginEmailEl = document.getElementById("loginEmail");
    const loginPasswordEl = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const logoutBtnLogin = document.getElementById("logoutBtnLogin");

    const statusEl = document.getElementById("status");
    const transactionTitleEl = document.getElementById("transactionTitle");
    const transactionAmountEl = document.getElementById("transactionAmount");
    const shoppingTitleEl = document.getElementById("shoppingTitle");
    const chatMessageEl = document.getElementById("chatMessage");

    const transactionsEl = document.getElementById("transactions");
    const shoppingEl = document.getElementById("shopping");
    const chatEl = document.getElementById("chat");

    const sumTransactionsEl = document.getElementById("sumTransactions");
    const openShoppingEl = document.getElementById("openShopping");
    const lastChatEl = document.getElementById("lastChat");

    let currentSession = null;
    let currentProfileName = "Unbekannt";

    let transactionsCache = [];
    let shoppingCache = [];
    let chatCache = [];

    function setLoginStatus(message, type = "err") {
      if (!message) {
        loginStatusEl.innerHTML = "";
        return;
      }
      loginStatusEl.innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    function setStatus(message, type = "ok") {
      if (!message) {
        statusEl.innerHTML = "";
        return;
      }
      statusEl.innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    function currentUserId() {
      return currentSession?.user?.id || null;
    }

    function currentUserName() {
      return currentProfileName || "Unbekannt";
    }

    async function fetchProfileName() {
      const userId = currentUserId();
      if (!userId) return "Unbekannt";

      const { data, error } = await supabase
        .from("profiles")
        .select("display_name")
        .eq("id", userId)
        .single();

      if (error || !data) return "Unbekannt";
      return data.display_name || "Unbekannt";
    }

    function showLogin() {
      loginView.classList.remove("hidden");
      appView.classList.add("hidden");
    }

    function showApp() {
      loginView.classList.add("hidden");
      appView.classList.remove("hidden");
    }

    function updateSummary() {
      const total = transactionsCache.reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const openItems = shoppingCache.filter(item => !item.is_done).length;
      const latestChat = chatCache.length > 0 ? chatCache[0] : null;

      sumTransactionsEl.textContent = `${total.toFixed(2).replace(".", ",")}€`;
      openShoppingEl.textContent = String(openItems);
      lastChatEl.textContent = latestChat ? `${latestChat.sender_name || "?"}: ${latestChat.message}` : "–";
    }

    async function loadTransactions() {
      const { data, error } = await supabase
        .from("transactions")
        .select("*")
        .eq("household_id", HOUSEHOLD_ID)
        .order("created_at", { ascending: false });

      if (error) throw new Error("Ausgaben: " + error.message);

      transactionsCache = data || [];

      transactionsEl.innerHTML = transactionsCache.map(item => `
        <div class="card">
          <div class="line">
            <strong>${item.title}</strong>
            <span>-${Number(item.amount).toFixed(2).replace(".", ",")}€</span>
          </div>
          <div class="muted">von ${item.created_by === currentUserId() ? currentUserName() : "Anderer Nutzer"}</div>
        </div>
      `).join("");

      if (transactionsCache.length === 0) {
        transactionsEl.innerHTML = `<div class="card">Noch keine Ausgaben vorhanden.</div>`;
      }
    }

    async function loadShopping() {
      const { data, error } = await supabase
        .from("shopping_items")
        .select("*")
        .eq("household_id", HOUSEHOLD_ID);

      if (error) throw new Error("Einkauf: " + error.message);

      shoppingCache = (data || []).sort((a, b) => {
        if (a.is_done === b.is_done) return String(b.id).localeCompare(String(a.id));
        return a.is_done - b.is_done;
      });

      shoppingEl.innerHTML = shoppingCache.map(item => `
        <div class="card">
          <div class="line">
            <div>
              <strong class="${item.is_done ? "done" : ""}">${item.title}</strong>
              <div class="muted">von ${item.added_by === currentUserId() ? currentUserName() : "Anderer Nutzer"}</div>
            </div>
            <div class="row" style="margin:0;">
              <button class="small-btn" data-toggle="${item.id}" data-done="${item.is_done ? "0" : "1"}">
                ${item.is_done ? "Offen" : "Erledigt"}
              </button>
              <button class="small-btn" data-delete-shopping="${item.id}">
                Löschen
              </button>
            </div>
          </div>
        </div>
      `).join("");

      if (shoppingCache.length === 0) {
        shoppingEl.innerHTML = `<div class="card">Noch keine Artikel vorhanden.</div>`;
      }

      document.querySelectorAll("[data-toggle]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-toggle");
          const doneValue = btn.getAttribute("data-done") === "1";
          await toggleShopping(id, doneValue);
        });
      });

      document.querySelectorAll("[data-delete-shopping]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-delete-shopping");
          await deleteShopping(id);
        });
      });
    }

    async function loadChat() {
      const { data, error } = await supabase
        .from("chat_messages")
        .select("*")
        .eq("household_id", HOUSEHOLD_ID)
        .order("created_at", { ascending: false });

      if (error) throw new Error("Chat: " + error.message);

      chatCache = (data || []).map(item => ({
        ...item,
        sender_name: item.sender_id === currentUserId() ? currentUserName() : "Anderer Nutzer"
      }));

      chatEl.innerHTML = chatCache.map(item => `
        <div class="card chat-card ${item.sender_id === currentUserId() ? "me" : "other"}">
          <strong>${item.sender_name}:</strong> ${item.message}
          <div class="muted">${new Date(new Date(item.created_at).getTime() + 2 * 60 * 60 * 1000).toLocaleString("de-DE", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          })}</div>
        </div>
      `).join("");

      if (chatCache.length === 0) {
        chatEl.innerHTML = `<div class="card">Noch keine Nachrichten vorhanden.</div>`;
      }
    }

    async function loadAll() {
      setStatus("");
      try {
        await Promise.all([
          loadTransactions(),
          loadShopping(),
          loadChat()
        ]);
        updateSummary();
      } catch (err) {
        setStatus(err.message, "err");
      }
    }

    async function addTransaction() {
      const title = transactionTitleEl.value.trim();
      const amount = parseFloat(transactionAmountEl.value);

      if (!title || Number.isNaN(amount)) {
        setStatus("Bitte Titel und Betrag eingeben.", "err");
        return;
      }

      const { error } = await supabase.from("transactions").insert({
        household_id: HOUSEHOLD_ID,
        title,
        amount,
        type: "expense",
        created_by: currentUserId()
      });

      if (error) {
        setStatus("Ausgabe konnte nicht gespeichert werden: " + error.message, "err");
        return;
      }

      transactionTitleEl.value = "";
      transactionAmountEl.value = "";
      transactionTitleEl.focus();
      await loadAll();
      setStatus(`Ausgabe von ${currentUserName()} gespeichert.`);
    }

    async function addShopping() {
      const title = shoppingTitleEl.value.trim();

      if (!title) {
        setStatus("Bitte einen Artikel eingeben.", "err");
        return;
      }

      const { error } = await supabase.from("shopping_items").insert({
        household_id: HOUSEHOLD_ID,
        title,
        is_done: false,
        added_by: currentUserId()
      });

      if (error) {
        setStatus("Artikel konnte nicht gespeichert werden: " + error.message, "err");
        return;
      }

      shoppingTitleEl.value = "";
      shoppingTitleEl.focus();
      await loadAll();
      setStatus(`Artikel von ${currentUserName()} hinzugefügt.`);
    }

    async function sendChat() {
      const message = chatMessageEl.value.trim();

      if (!message) {
        setStatus("Bitte eine Nachricht eingeben.", "err");
        return;
      }

      const { error } = await supabase.from("chat_messages").insert({
        household_id: HOUSEHOLD_ID,
        sender_id: currentUserId(),
        message
      });

      if (error) {
        setStatus("Nachricht konnte nicht gesendet werden: " + error.message, "err");
        return;
      }

      chatMessageEl.value = "";
      chatMessageEl.focus();
      await loadAll();
      setStatus(`Nachricht von ${currentUserName()} gesendet.`);
    }

    async function toggleShopping(id, doneValue) {
      const { error } = await supabase
        .from("shopping_items")
        .update({ is_done: doneValue })
        .eq("id", id);

      if (error) {
        setStatus("Artikel konnte nicht geändert werden: " + error.message, "err");
        return;
      }

      await loadAll();
      setStatus("Einkaufszettel aktualisiert.");
    }

    async function deleteShopping(id) {
      const { error } = await supabase
        .from("shopping_items")
        .delete()
        .eq("id", id);

      if (error) {
        setStatus("Artikel konnte nicht gelöscht werden: " + error.message, "err");
        return;
      }

      await loadAll();
      setStatus("Artikel gelöscht.");
    }

    async function login() {
      const email = loginEmailEl.value.trim();
      const password = loginPasswordEl.value;

      if (!email || !password) {
        setLoginStatus("Bitte E-Mail und Passwort eingeben.", "err");
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setLoginStatus("Login fehlgeschlagen: " + error.message, "err");
        return;
      }

      setLoginStatus("");
    }

    async function logout() {
      await supabase.auth.signOut();
    }

    async function handleSession() {
      const { data } = await supabase.auth.getSession();
      currentSession = data.session;

      if (!currentSession) {
        showLogin();
        return;
      }

      currentProfileName = await fetchProfileName();
      currentUserLabelEl.textContent = `Angemeldet als: ${currentProfileName}`;
      showApp();
      await loadAll();
    }

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
    logoutBtnLogin.addEventListener("click", logout);

    loginPasswordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    transactionTitleEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTransaction();
    });

    transactionAmountEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTransaction();
    });

    shoppingTitleEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addShopping();
    });

    chatMessageEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendChat();
    });

    const channel = supabase
      .channel("c4keks-live")
      .on("postgres_changes", {
        event: "*",
        schema: "public",
        table: "transactions"
      }, loadAll)
      .on("postgres_changes", {
        event: "*",
        schema: "public",
        table: "shopping_items"
      }, loadAll)
      .on("postgres_changes", {
        event: "*",
        schema: "public",
        table: "chat_messages"
      }, loadAll)
      .subscribe();

    supabase.auth.onAuthStateChange(async () => {
      await handleSession();
    });

    handleSession();
  </script>
</body>
</html>
