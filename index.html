<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>C4Keks Haushalt</title>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px;}
h1 { color:#00ffaa;}
.card { background:#1e1e1e; padding:12px; margin-bottom:10px; border-radius:10px;}
input, button { padding:10px; margin:5px; border-radius:6px; border:none;}
button { background:#00aa88; color:white; cursor:pointer;}
</style>

</head>

<body>

<h1>🏠 Haushalt C&A</h1>

<h2>💸 Ausgabe hinzufügen</h2>
<input id="t_title" placeholder="Titel">
<input id="t_amount" placeholder="Betrag">
<button onclick="addTransaction()">Speichern</button>

<h2>🛒 Einkauf hinzufügen</h2>
<input id="s_title" placeholder="Artikel">
<button onclick="addShopping()">Hinzufügen</button>

<h2>💬 Chat senden</h2>
<input id="c_msg" placeholder="Nachricht">
<button onclick="sendChat()">Senden</button>

<hr>

<h2>💸 Ausgaben</h2>
<div id="transactions"></div>

<h2>🛒 Einkauf</h2>
<div id="shopping"></div>

<h2>💬 Chat</h2>
<div id="chat"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://metfuxwfwkqkpcsfsfkw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ldGZ1eHdmd2txa3Bjc2ZzZmt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzc2NTYsImV4cCI6MjA4OTgxMzY1Nn0.5-YJNH5AP9YWwHqxRg296HxM3YY_Qqf_mVF8TNn-WUo"
);

const householdId = "67c484b6-e608-4d2c-a1cc-ee55af5340ea";
const userId = "ec892c1d-4a7a-456b-aa2b-a6dd26dbf0bb";

async function loadData() {
  const { data: t } = await supabase.from("transactions").select("*").order("created_at",{ascending:false});
  const { data: s } = await supabase.from("shopping_items").select("*").order("created_at",{ascending:false});
  const { data: c } = await supabase.from("chat_messages").select("*").order("created_at",{ascending:false});

  document.getElementById("transactions").innerHTML =
    t.map(x => `<div class="card">${x.title} - ${x.amount}€</div>`).join("");

  document.getElementById("shopping").innerHTML =
    s.map(x => `<div class="card">${x.title}</div>`).join("");

  document.getElementById("chat").innerHTML =
    c.map(x => `<div class="card">${x.message}</div>`).join("");
}

window.addTransaction = async () => {
  await supabase.from("transactions").insert({
    household_id: householdId,
    title: document.getElementById("t_title").value,
    amount: document.getElementById("t_amount").value,
    type: "expense",
    created_by: userId
  });
  loadData();
};

window.addShopping = async () => {
  await supabase.from("shopping_items").insert({
    household_id: householdId,
    title: document.getElementById("s_title").value,
    is_done: false,
    added_by: userId
  });
  loadData();
};

window.sendChat = async () => {
  await supabase.from("chat_messages").insert({
    household_id: householdId,
    sender_id: userId,
    message: document.getElementById("c_msg").value
  });
  loadData();
};

loadData();
</script>

</body>
</html>
